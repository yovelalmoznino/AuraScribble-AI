name: AuraScribble Auto-Train Pipeline

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install torch onnx firebase-admin pyyaml numpy
          
      - name: Firebase Authentication
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-service-account.json
        
      - name: Run Auto-Train Script
        run: python src/auto_train.py
