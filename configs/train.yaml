# Flat keys read directly by train.py / predict.py
output_dir: "output"
vocab_path: "configs/vocab.txt"
model_path: "models/checkpoint_best.pt"
model_type: "transformer"
resume_from_checkpoint: false
train_manifest: "data/processed/train.jsonl"
val_manifest: "data/processed/val.jsonl"
max_seq_len: 256
max_tgt_len: 160
batch_size: 24
learning_rate: 0.00002
epochs: 10
seed: 1337
num_workers: 0
grad_clip_norm: 1.0
correction_loss_weight: 3.0
val_every_epochs: 1
# Cap greedy decode during training (full eval in predict.py / evaluate.py). 0 = no cap.
val_max_samples: 200
decode_max_steps: 128
decode_max_tgt_window: 128
max_tgt_len: 192

# Architecture
input_dim: 3
hidden_dim: 256
encoder_hidden: 256
decoder_hidden: 256
num_layers: 3
encoder_layers: 3
dropout: 0.15

# Nested structure (export_onnx.py)
vocab:
  file: configs/vocab.txt
training:
  seed: 1337
  epochs: 10
  batch_size: 24
  learning_rate: 0.00002
  device: "cpu"
model:
  input_dim: 3
  encoder_hidden: 256
  encoder_layers: 3
  decoder_hidden: 256
  dropout: 0.15
data:
  train_manifest: "data/processed/train.jsonl"
  val_manifest: "data/processed/val.jsonl"
export:
  onnx_file: "output/model.onnx"
  quantized_onnx_file: "output/model.int8.onnx"
firebase:
  bucket: "aurascribblr.firebasestorage.app"
  model_path: "models/latest_handwriting.onnx"
  vocab_path: "models/latest_vocab.txt"
