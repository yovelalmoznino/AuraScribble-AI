# מפתחות שטוחים (עבור הסקריפטים האוטומטיים וה-Auto-Train)
output_dir: "output"
vocab_path: "configs/vocab.txt"
model_path: "models/base_model.pth"
train_manifest: "data/processed/train.jsonl"
val_manifest: "data/processed/train.jsonl"
max_seq_len: 256
max_tgt_len: 160
batch_size: 24
learning_rate: 0.00002
epochs: 5
device: "cpu"
seed: 1337

# המבנה המקורי (לשמירה על תאימות עם שאר חלקי הקוד)
vocab:
  file: configs/vocab.txt
training:
  seed: 1337
  epochs: 5
  resume: true
  early_stopping: true
  early_stopping_patience: 40
  early_stopping_min_delta: 0.0001
  batch_size: 24
  learning_rate: 0.00002
  max_seq_len: 256
  max_tgt_len: 160
  device: "cpu"
model:
  input_dim: 3
  encoder_hidden: 256
  encoder_layers: 3
  decoder_hidden: 256
  dropout: 0.15
data:
  train_manifest: "data/processed/train.jsonl"
  val_manifest: "data/processed/train.jsonl"
  use_raw_fallback: false
  synthetic_count: 20000
export:
  onnx_file: "output/model.onnx"
