# מפתחות שטוחים (השכבה ש-train.py קורא ישירות)
output_dir: "output"
vocab_path: "configs/vocab.txt"
model_path: "models/checkpoint_best.pt"
train_manifest: "data/processed/train.jsonl"
val_manifest: "data/processed/train.jsonl"
max_seq_len: 256
max_tgt_len: 160
batch_size: 24
learning_rate: 0.00002
epochs: 5
device: "cpu"
seed: 1337

# הגדרות ארכיטקטורה (כאן הייתה השגיאה)
input_dim: 3
hidden_dim: 256
encoder_hidden: 256
decoder_hidden: 256
num_layers: 3        # השם שהקוד חיפש עכשיו
encoder_layers: 3    # גיבוי
dropout: 0.15

# המבנה המקורי (לתאימות)
vocab:
  file: configs/vocab.txt
training:
  seed: 1337
  epochs: 5
  batch_size: 24
  learning_rate: 0.00002
  device: "cpu"
model:
  input_dim: 3
  encoder_hidden: 256
  encoder_layers: 3
  decoder_hidden: 256
  dropout: 0.15
data:
  train_manifest: "data/processed/train.jsonl"
  val_manifest: "data/processed/train.jsonl"
export:
  onnx_file: "output/model.onnx"
